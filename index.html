<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="볼드모트">
<meta name="theme-color" content="#07070c">
<title>볼드모트: 어둠의 군주</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html, body {
    position:fixed; inset:0; width:100%; height:100%;
    overflow:hidden; overscroll-behavior:none;
    background:#07070c; color:#d8d4e6;
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  #game { position:fixed; inset:0; display:block; touch-action:none; }

  /* ---------- 공통 오버레이 ---------- */
  .screen {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    padding-top:calc(env(safe-area-inset-top) + 24px);
    padding-bottom:calc(env(safe-area-inset-bottom) + 24px);
    background:rgba(5,4,12,0.82);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    opacity:1; transition:opacity .45s ease;
    text-align:center;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  h1.gameTitle {
    font-size:clamp(30px, 9vw, 46px); font-weight:800; letter-spacing:.06em;
    color:#7CFF6B;
    text-shadow:0 0 18px rgba(80,255,90,.55), 0 0 60px rgba(60,220,80,.25);
    margin-bottom:6px;
  }
  .subTitle { font-size:15px; color:#9a8fc0; letter-spacing:.35em; margin-bottom:40px; }
  .btn {
    display:block; width:min(78vw, 300px); margin:9px auto; padding:15px 10px;
    font-size:17px; font-weight:700; color:#d9ffd2; letter-spacing:.08em;
    background:linear-gradient(180deg, rgba(20,48,24,.92), rgba(8,20,12,.95));
    border:1px solid rgba(110,255,120,.35); border-radius:12px;
    box-shadow:0 0 14px rgba(60,220,80,.18), inset 0 1px 0 rgba(255,255,255,.06);
    cursor:pointer; font-family:inherit;
    transition:transform .08s ease, box-shadow .2s;
  }
  .btn:active { transform:scale(.965); box-shadow:0 0 22px rgba(80,255,100,.35); }
  .btn.secondary { color:#b9b0d8; border-color:rgba(150,130,220,.3); background:linear-gradient(180deg, rgba(30,24,52,.9), rgba(14,10,26,.95)); box-shadow:0 0 12px rgba(120,90,220,.14); }
  .btn:disabled { opacity:.35; pointer-events:none; }
  .noteIP { position:absolute; bottom:calc(env(safe-area-inset-bottom) + 10px); left:0; right:0; font-size:10.5px; color:#5c5575; line-height:1.5; padding:0 16px; }

  /* ---------- 로딩 ---------- */
  #scrLoading .loadOrb {
    width:64px; height:64px; border-radius:50%; margin-bottom:22px;
    background:radial-gradient(circle at 40% 35%, #a8ff9a, #1f8a2e 55%, #06230b 80%);
    box-shadow:0 0 34px rgba(90,255,100,.7);
    animation:pulse 1.1s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform:scale(.85); opacity:.7; } to { transform:scale(1.08); opacity:1; } }
  #scrLoading p { color:#8fbf8a; letter-spacing:.2em; font-size:14px; }

  /* ---------- 스토리 ---------- */
  #scrStory { justify-content:center; background:rgba(4,3,10,.94); }
  #storyTitle { font-size:22px; font-weight:800; color:#c9b3ff; margin-bottom:6px; text-shadow:0 0 16px rgba(150,90,255,.4); }
  #storyPlace { font-size:13px; color:#7a6fa0; letter-spacing:.25em; margin-bottom:26px; }
  #storyText { max-width:520px; font-size:15.5px; line-height:1.85; color:#cfc8e2; text-align:left; white-space:pre-line; margin-bottom:34px; }
  #storyHint { font-size:12px; color:#665e88; margin-top:14px; }

  /* ---------- 상점 ---------- */
  #scrShop { justify-content:flex-start; padding-top:calc(env(safe-area-inset-top) + 34px); overflow-y:auto; }
  #scrShop h2 { font-size:22px; color:#7CFF6B; margin-bottom:4px; text-shadow:0 0 14px rgba(90,255,100,.4); }
  #shopStageInfo { font-size:13px; color:#8b82ad; margin-bottom:10px; }
  #shopSouls { font-size:16px; font-weight:700; color:#b9ff8e; margin-bottom:18px; }
  #shopList { width:min(92vw, 420px); }
  .upRow {
    display:flex; align-items:center; gap:10px;
    background:rgba(20,16,38,.85); border:1px solid rgba(130,110,200,.22);
    border-radius:12px; padding:11px 12px; margin-bottom:9px; text-align:left;
  }
  .upInfo { flex:1; min-width:0; }
  .upName { font-size:15px; font-weight:700; color:#e4ddf5; }
  .upLvl { font-size:12px; color:#8fe08a; margin-left:6px; }
  .upDesc { font-size:12px; color:#8b82ad; margin-top:3px; }
  .upBuy {
    flex:none; padding:9px 13px; min-width:76px;
    font-size:13.5px; font-weight:700; color:#d9ffd2; font-family:inherit;
    background:linear-gradient(180deg, rgba(22,52,26,.95), rgba(9,22,13,.95));
    border:1px solid rgba(110,255,120,.35); border-radius:10px; cursor:pointer;
  }
  .upBuy:active { transform:scale(.95); }
  .upBuy:disabled { opacity:.32; }
  .upBuy.maxed { color:#9a8fc0; border-color:rgba(150,130,220,.3); background:rgba(28,22,48,.8); }

  /* ---------- 게임오버 / 승리 ---------- */
  #overTitle { font-size:30px; font-weight:800; color:#ff5d5d; text-shadow:0 0 20px rgba(255,60,60,.5); margin-bottom:12px; }
  #overText, #vicText { max-width:480px; font-size:15px; line-height:1.8; color:#c5bedb; margin-bottom:26px; white-space:pre-line; }
  #vicTitle { font-size:28px; font-weight:800; color:#b7ff86; text-shadow:0 0 22px rgba(120,255,100,.55); margin-bottom:12px; }

  /* ---------- 일시정지 ---------- */
  #pauseTitle { font-size:24px; font-weight:800; color:#cfc8e2; margin-bottom:24px; letter-spacing:.15em; }

  /* ---------- HUD ---------- */
  #hud {
    position:fixed; left:0; right:0; top:0; z-index:10;
    padding:calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 10px) 0 calc(env(safe-area-inset-left) + 10px);
    display:flex; align-items:flex-start; gap:8px;
    pointer-events:none;
    opacity:1; transition:opacity .3s;
  }
  #hud.hidden { opacity:0; }
  #hudLeft { flex:1; min-width:0; }
  #hpBar {
    width:min(46vw, 210px); height:15px; border-radius:8px;
    background:rgba(10,8,20,.75); border:1px solid rgba(255,90,90,.35);
    overflow:hidden; position:relative;
  }
  #hpFill { height:100%; width:100%; border-radius:7px;
    background:linear-gradient(90deg, #5f1420, #c22b3f 60%, #ff5d6b);
    box-shadow:0 0 10px rgba(255,70,90,.45);
    transition:width .15s linear; }
  #hpText { position:absolute; inset:0; font-size:10px; font-weight:700; color:#ffd9dd; display:flex; align-items:center; justify-content:center; text-shadow:0 1px 2px #000; }
  #stageText { font-size:12px; font-weight:700; color:#a99ecf; margin-top:5px; text-shadow:0 1px 3px #000; }
  #soulText { font-size:13px; font-weight:800; color:#b9ff8e; margin-top:3px; text-shadow:0 0 8px rgba(120,255,100,.5); }
  .hudBtn {
    pointer-events:auto; flex:none;
    width:38px; height:38px; border-radius:10px;
    background:rgba(14,11,28,.8); border:1px solid rgba(140,120,210,.3);
    color:#cfc8e2; font-size:15px; font-weight:800; font-family:inherit;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .hudBtn:active { transform:scale(.92); }
  .hudBtn.off { color:#5c5575; text-decoration:line-through; }

  /* ---------- 보스 바 ---------- */
  #bossBar {
    position:fixed; z-index:10; left:50%; transform:translateX(-50%);
    top:calc(env(safe-area-inset-top) + 62px);
    width:min(78vw, 340px); text-align:center;
    transition:opacity .4s;
  }
  #bossBar.hidden { opacity:0; }
  #bossName { font-size:13px; font-weight:800; color:#e8b3ff; text-shadow:0 0 10px rgba(200,90,255,.6); margin-bottom:4px; }
  #bossTrack { height:10px; border-radius:6px; background:rgba(10,8,20,.75); border:1px solid rgba(200,90,255,.4); overflow:hidden; }
  #bossFill { height:100%; width:100%; background:linear-gradient(90deg,#4b1160,#a12bd6 60%,#e07bff); box-shadow:0 0 10px rgba(200,90,255,.5); transition:width .12s linear; }

  /* ---------- 스킬 버튼 ---------- */
  #skills {
    position:fixed; z-index:10;
    right:calc(env(safe-area-inset-right) + 12px);
    bottom:calc(env(safe-area-inset-bottom) + 14px);
    display:flex; flex-direction:column; gap:11px;
    transition:opacity .3s;
  }
  #skills.hidden { opacity:0; pointer-events:none; }
  .skill {
    position:relative; width:66px; height:66px; border-radius:50%;
    border:2px solid rgba(110,255,120,.5);
    background:radial-gradient(circle at 35% 30%, rgba(40,90,45,.95), rgba(8,18,10,.95));
    color:#d9ffd2; font-family:inherit; font-size:10.5px; font-weight:800; line-height:1.25;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 14px rgba(70,230,90,.25);
    cursor:pointer; overflow:hidden; touch-action:none;
  }
  .skill:active { transform:scale(.93); }
  .skill .cool {
    position:absolute; left:0; right:0; bottom:0; height:0%;
    background:rgba(4,6,12,.82); pointer-events:none;
  }
  .skill .lab { position:relative; z-index:1; text-shadow:0 1px 2px #000; white-space:pre-line; text-align:center; }
  .skill.s1 { border-color:rgba(255,150,60,.55); background:radial-gradient(circle at 35% 30%, rgba(110,50,15,.95), rgba(22,8,4,.95)); color:#ffdcae; box-shadow:0 0 14px rgba(255,130,40,.25); }
  .skill.s2 { border-color:rgba(170,110,255,.55); background:radial-gradient(circle at 35% 30%, rgba(60,32,110,.95), rgba(12,6,24,.95)); color:#e2d2ff; box-shadow:0 0 14px rgba(160,90,255,.25); }
  .skill.ready { animation:readyGlow 1.6s ease-in-out infinite alternate; }
  @keyframes readyGlow { from { box-shadow:0 0 8px rgba(160,255,160,.25); } to { box-shadow:0 0 22px rgba(160,255,160,.6); } }

  /* ---------- 배너 ---------- */
  #banner {
    position:fixed; z-index:15; left:0; right:0; top:34%;
    text-align:center; pointer-events:none;
    opacity:0; transition:opacity .35s;
    padding:0 18px;
  }
  #banner.show { opacity:1; }
  #bannerMain { font-size:24px; font-weight:800; color:#e6ddff; text-shadow:0 0 16px rgba(150,90,255,.65), 0 2px 6px #000; letter-spacing:.06em; }
  #bannerSub { font-size:14px; color:#b9aee0; margin-top:8px; text-shadow:0 1px 4px #000; line-height:1.6; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hudLeft">
    <div id="hpBar"><div id="hpFill"></div><div id="hpText"></div></div>
    <div id="stageText"></div>
    <div id="soulText"></div>
  </div>
  <button class="hudBtn" id="muteBtn" aria-label="소리">♪</button>
  <button class="hudBtn" id="pauseBtn" aria-label="일시정지">❚❚</button>
</div>

<div id="bossBar" class="hidden">
  <div id="bossName"></div>
  <div id="bossTrack"><div id="bossFill"></div></div>
</div>

<div id="skills" class="hidden">
  <button class="skill s0" id="sk0"><div class="cool"></div><span class="lab">아바다&#10;케다브라</span></button>
  <button class="skill s1" id="sk1"><div class="cool"></div><span class="lab">악령의 불</span></button>
  <button class="skill s2" id="sk2"><div class="cool"></div><span class="lab">호크룩스&#10;결계</span></button>
</div>

<div id="banner"><div id="bannerMain"></div><div id="bannerSub"></div></div>

<!-- 로딩 -->
<div class="screen" id="scrLoading">
  <div class="loadOrb"></div>
  <p>어둠을 깨우는 중…</p>
</div>

<!-- 타이틀 -->
<div class="screen hidden" id="scrTitle">
  <h1 class="gameTitle">볼드모트</h1>
  <div class="subTitle">어둠의 군주</div>
  <button class="btn" id="btnNew">새로 시작</button>
  <button class="btn secondary hidden" id="btnContinue">이어하기</button>
  <div class="noteIP">비공식 팬 게임 · Harry Potter는 원작자와 워너브라더스의 자산입니다<br>드래그로 이동 · 스킬 버튼으로 어둠의 마법 시전</div>
</div>

<!-- 스토리 -->
<div class="screen hidden" id="scrStory">
  <div id="storyTitle"></div>
  <div id="storyPlace"></div>
  <div id="storyText"></div>
  <button class="btn" id="btnStoryGo">전투 개시</button>
  <div id="storyHint">화면을 눌러도 넘어갑니다</div>
</div>

<!-- 상점 -->
<div class="screen hidden" id="scrShop">
  <h2>어둠의 제단</h2>
  <div id="shopStageInfo"></div>
  <div id="shopSouls"></div>
  <div id="shopList"></div>
  <button class="btn" id="btnShopGo" style="margin-top:14px;">다음 스테이지로</button>
</div>

<!-- 게임 오버 -->
<div class="screen hidden" id="scrOver">
  <div id="overTitle">쓰러졌다…</div>
  <div id="overText"></div>
  <div id="overSouls" style="font-size:14px;color:#b9ff8e;margin-bottom:20px;"></div>
  <button class="btn" id="btnRetry">이 스테이지 재도전</button>
  <button class="btn secondary" id="btnOverTitle">처음 화면으로</button>
</div>

<!-- 승리 -->
<div class="screen hidden" id="scrVictory">
  <div id="vicTitle">어둠이 세상을 덮다</div>
  <div id="vicText"></div>
  <button class="btn secondary" id="btnVicTitle">처음 화면으로</button>
</div>

<!-- 일시정지 -->
<div class="screen hidden" id="scrPause">
  <div id="pauseTitle">일시정지</div>
  <button class="btn" id="btnResume">계속하기</button>
  <button class="btn secondary" id="btnPauseTitle">처음 화면으로</button>
</div>

<script>
'use strict';
/* ================================================================
 * 볼드모트: 어둠의 군주 — 비공식 팬 게임
 * 모든 스토리/대사는 창작 텍스트입니다.
 * 섹션: 데이터 / 저장 / 오디오 / 엔진 / 입력 / 엔티티 / 웨이브 / UI
 * ================================================================ */

/* ==================== [데이터] ==================== */

const STAGES = [
  {
    title: '1장 · 낡은 일기장',
    place: '버려진 리들 저택',
    story: '기억은 낡은 저택의 먼지 속에 잠들어 있었다. 소년 시절의 나, 톰 리들이 처음으로 영혼을 쪼개어 담았던 일기장. 그 첫 조각이 위험에 처했다는 소식이 어둠을 타고 전해졌다.\n\n오러들이 저택을 포위했다. 놈들은 내 과거를 파헤치고, 내 불멸의 뿌리를 뽑으려 한다. 가소로운 일이다.\n\n오늘 밤, 이 저택의 어둠이 얼마나 깊은지 저들에게 가르쳐 주겠다.',
    bossKey: 'moody',
    horcrux: '일기장',
  },
  {
    title: '2장 · 곤트의 반지',
    place: '곤트 가문의 오두막',
    story: '어머니의 핏줄, 몰락한 곤트 가문의 오두막. 썩은 마룻바닥 아래에 두 번째 조각이 숨 쉬고 있다. 반지에 걸어 둔 저주는 여전히 살아 있지만, 저들의 집요함은 저주보다 끈질기다.\n\n불사조 기사단이 오두막 주변의 늪을 건너오고 있다. 밤안개 속에서 지팡이 불빛이 하나둘 떠오른다.\n\n좋다. 늪은 시체를 감추기 좋은 곳이지.',
    bossKey: 'tonks',
    horcrux: '곤트의 반지',
  },
  {
    title: '3장 · 슬리데린의 로켓',
    place: '바닷가의 검은 동굴',
    story: '파도가 절벽을 물어뜯는 검은 동굴. 물 아래의 손들이 지키는 호수 한가운데, 세 번째 조각이 잠들어 있다.\n\n그러나 동굴 입구에 낯익은 마력의 흔적이 남아 있었다. 아즈카반을 벗어난 사냥개가 제 발로 죽을 곳을 찾아온 모양이다.\n\n동굴의 어둠은 나의 것이다. 이곳에서 빛은 오래 버티지 못한다.',
    bossKey: 'sirius',
    horcrux: '슬리데린의 로켓',
  },
  {
    title: '4장 · 후플푸프의 잔',
    place: '그린고츠 깊은 금고',
    story: '땅속 깊은 곳, 용의 숨결이 데운 금고 안에 네 번째 조각이 있다. 금화 더미 사이에서 잔은 조용히 내 영혼을 담아 왔다.\n\n호그와트의 교수들이 금고로 통하는 갱도를 막아섰다. 변신술의 대가가 직접 내려왔다는군. 지팡이를 잡은 손끝이 오랜만에 떨린다. 두려움이 아니라, 기대감으로.\n\n깊은 땅속에서는 비명도 멀리 가지 못한다.',
    bossKey: 'mcgonagall',
    horcrux: '후플푸프의 잔',
  },
  {
    title: '5장 · 래번클로의 보관',
    place: '호그와트 · 필요의 방',
    story: '천 개의 잃어버린 물건들이 쌓인 방. 그 미로 한가운데에 다섯 번째 조각, 지혜의 보관이 놓여 있다.\n\n그런데 방문 앞에 서 있는 것은 다름 아닌 나의 심복이었다. 세베루스 스네이프. 그의 눈빛이 전과 다르다. 오클루먼시로도 가릴 수 없는 것이 새어 나오고 있다.\n\n배신의 냄새는 어떤 어둠 속에서도 맡을 수 있지. 시험해 보겠다. 그의 충성심과, 그의 목숨을.',
    bossKey: 'snape',
    horcrux: '래번클로의 보관',
  },
  {
    title: '6장 · 나기니',
    place: '호그와트 경계 · 금지된 숲',
    story: '나기니, 나의 마지막 벗이자 여섯 번째 조각. 숲의 어둠 속에서 그녀의 비늘이 차갑게 빛난다.\n\n소년이 온다. 이마에 흉터를 지닌 그 아이가, 홀로 숲을 걸어 들어온다. 예언이 우리를 이 밤으로 끌고 왔다.\n\n소년이여, 네가 지키려는 모든 것이 오늘 밤 재가 될 것이다. 둘 중 하나는 이 숲을 걸어 나가지 못한다.',
    bossKey: 'harry',
    horcrux: '나기니',
  },
  {

const Save = {

    } catch (e) { /* 저장 불가 환경 */ }
    this.data = this.fresh();
  },
  write() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(this.data)); } catch (e) { /* 무시 */ }
  },
  reset() { this.data = this.fresh(); this.write(); },
};

const Snd = {
  ctx: null, master: null, bgmGain: null,
  muted: Save.data.muted, bgmTimer: null, nextBar: 0, barIdx: 0,
  unlock() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 0.55;
      this.master.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = 0.30;
      this.bgmGain.connect(this.master);
      this.startBgm();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  setMuted(m) {
    this.muted = m;
    Save.data.muted = m; Save.write();
    if (this.master) this.master.gain.value = m ? 0 : 0.55;
  },
  tone(freq, dur, type, vol, endFreq, delay) {
    if (!this.ctx || this.muted) return;
    const t0 = this.ctx.currentTime + (delay || 0);
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t0);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(this.master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  },
  noise(dur, vol, freq, delay) {
    if (!this.ctx || this.muted) return;
    const t0 = this.ctx.currentTime + (delay || 0);
    const len = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq || 900;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t0);
  },
  play(name) {
    if (!this.ctx || this.muted) return;
    switch (name) {
      case 'shoot':   this.tone(720, 0.09, 'square', 0.05, 240); break;
      case 'hit':     this.tone(210, 0.08, 'sawtooth', 0.07, 90); break;
      case 'die':     this.noise(0.22, 0.12, 700); this.tone(320, 0.2, 'triangle', 0.08, 60); break;
      case 'hurt':    this.tone(140, 0.22, 'sawtooth', 0.16, 55); this.noise(0.16, 0.1, 500); break;
      case 'soul':    this.tone(880, 0.07, 'sine', 0.05, 1320); break;
      case 'beam':    this.tone(90, 0.6, 'sawtooth', 0.18, 480); this.noise(0.5, 0.12, 1400); break;
      case 'fire':    this.noise(0.75, 0.22, 1100); this.tone(70, 0.7, 'sawtooth', 0.14, 30); break;
      case 'shieldOn':this.tone(300, 0.35, 'sine', 0.12, 620); this.tone(450, 0.4, 'sine', 0.08, 900, 0.08); break;
      case 'boss':    this.tone(60, 1.1, 'sawtooth', 0.2, 38); this.noise(0.9, 0.14, 300); break;
      case 'clear':   [523, 622, 784, 1046].forEach((f, i) => this.tone(f, 0.32, 'triangle', 0.09, null, i * 0.11)); break;
      case 'ui':      this.tone(500, 0.06, 'sine', 0.07, 700); break;
      case 'buy':     this.tone(660, 0.1, 'sine', 0.08, 990); this.tone(990, 0.14, 'sine', 0.06, 1320, 0.07); break;
      case 'deny':    this.tone(180, 0.14, 'square', 0.06, 120); break;
      case 'over':    this.tone(220, 0.8, 'sawtooth', 0.12, 40); this.tone(110, 1.2, 'triangle', 0.1, 30, 0.15); break;
    }
  },
  /* 배경음: 낮은 드론 + 단조 아르페지오 스케줄러 */
  startBgm() {
    if (this.bgmTimer) return;
    this.nextBar = this.ctx.currentTime + 0.1;
    this.barIdx = 0;
    this.bgmTimer = setInterval(() => this.schedBgm(), 300);
  },
  schedBgm() {
    if (!this.ctx || this.muted) { this.nextBar = Math.max(this.nextBar, this.ctx ? this.ctx.currentTime + 0.1 : 0); return; }
    const BAR = 2.4;
    while (this.nextBar < this.ctx.currentTime + 1.2) {
      const t = this.nextBar;
      const roots = [73.42, 73.42, 87.31, 69.30]; // D2 D2 F2 C#2
      const root = roots[this.barIdx % 4];
      // 드론
      const o1 = this.ctx.createOscillator(), o2 = this.ctx.createOscillator();
      const g = this.ctx.createGain(); const f = this.ctx.createBiquadFilter();
      o1.type = 'sawtooth'; o2.type = 'sawtooth';
      o1.frequency.value = root; o2.frequency.value = root * 1.006;
      f.type = 'lowpass'; f.frequency.value = 260;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.06, t + 0.4);
      g.gain.linearRampToValueAtTime(0.0001, t + BAR);
      o1.connect(f); o2.connect(f); f.connect(g); g.connect(this.bgmGain);
      o1.start(t); o2.start(t); o1.stop(t + BAR + 0.05); o2.stop(t + BAR + 0.05);
      // 종소리풍 멜로디 (D단조 계열)
      const scale = [293.66, 349.23, 440.0, 466.16, 554.37];
      const n = 2 + (this.barIdx % 2);
      for (let i = 0; i < n; i++) {
        const nf = scale[Math.floor(Math.random() * scale.length)] * (Math.random() < 0.25 ? 0.5 : 1);
        const ob = this.ctx.createOscillator(); const gb = this.ctx.createGain();
        ob.type = 'sine'; ob.frequency.value = nf;
        const tn = t + (i * BAR) / n + Math.random() * 0.15;
        gb.gain.setValueAtTime(0.0001, tn);
        gb.gain.linearRampToValueAtTime(0.045, tn + 0.02);
        gb.gain.exponentialRampToValueAtTime(0.001, tn + 1.4);
        ob.connect(gb); gb.connect(this.bgmGain);
        ob.start(tn); ob.stop(tn + 1.5);
      }
      this.nextBar += BAR; this.barIdx++;
    }
  },
};

const canvas = document.getElementById('game');

let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (player) {
    player.x = clamp(player.x, 24, W - 24);
    player.y = clamp(player.y, H * 0.35, H - 60);
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));

function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }

const Input = {
  drag: null, // { sx, sy, px, py, id }
  tx: 0, ty: 0, active: false,
  init() {
    const el = canvas;
    const down = (x, y, id) => {
      Snd.unlock();
      if (G.state !== 'play' || player.dead) return;
      this.drag = { sx: x, sy: y, px: player.x, py: player.y, id };
      this.tx = player.x; this.ty = player.y; this.active = true;
    };
    const move = (x, y, id) => {
      if (!this.drag || this.drag.id !== id) return;
      this.tx = clamp(this.drag.px + (x - this.drag.sx) * 1.2, 22, W - 22);
      this.ty = clamp(this.drag.py + (y - this.drag.sy) * 1.2, H * 0.32, H - 46);
    };
    const up = (id) => { if (this.drag && this.drag.id === id) { this.drag = null; this.active = false; } };

    if (window.PointerEvent) {
      el.addEventListener('pointerdown', e => { e.preventDefault(); down(e.clientX, e.clientY, e.pointerId); }, { passive: false });
      window.addEventListener('pointermove', e => move(e.clientX, e.clientY, e.pointerId), { passive: true });
      window.addEventListener('pointerup', e => up(e.pointerId));
      window.addEventListener('pointercancel', e => up(e.pointerId));
    } else {
      el.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; down(t.clientX, t.clientY, t.identifier); }, { passive: false });
      el.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches) move(t.clientX, t.clientY, t.identifier); }, { passive: false });
      el.addEventListener('touchend', e => { for (const t of e.changedTouches) up(t.identifier); });
      el.addEventListener('mousedown', e => down(e.clientX, e.clientY, 'm'));
      window.addEventListener('mousemove', e => move(e.clientX, e.clientY, 'm'));
      window.addEventListener('mouseup', () => up('m'));
    }
    // iOS 줌/제스처 방지
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());
    document.addEventListener('touchmove', e => { if (e.scale && e.scale !== 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.body.addEventListener('touchstart', () => Snd.unlock(), { passive: true });
  },
};

function scaleMul() { return 1 + 0.42 * G.stage + 0.07 * Math.min(G.wave, 5); }
function dmgMul() { return 1 + 0.14 * G.stage; }

function spawnEnemy(type) {
  const d = ETYPES[type];
  const m = scaleMul();
  enemies.push({
    type, name: d.name,
    x: rand(30, W - 30), y: rand(-90, -40),
    hp: d.hp * m, maxhp: d.hp * m,
    spd: d.spd * (1 + 0.03 * G.stage) * rand(0.9, 1.1),
    dmg: d.dmg * dmgMul(),
    r: d.r, souls: d.souls,
    color: d.color, eye: d.eye, shoots: d.shoots,
    t: rand(0, 6.28), fireT: rand(1.2, 2.4),
    stopY: d.shoots ? rand(H * 0.18, H * 0.4) : 1e9,
    hitT: 0,
  });
}

function spawnBoss() {
  const bk = STAGES[G.stage].bossKey;
  const bd = BOSSES[bk];
  const hp = bd.hp * (1 + 0.1 * Save.data.up.damage); // 업그레이드에 맞춰 미세 보정
  G.boss = {
    key: bk, name: bd.name, color: bd.color, eye: bd.eye,
    x: W / 2, y: -110, ty: H * 0.2,
    hp, maxhp: hp, r: 40,
    t: 0, fireT: 1.6, patT: 3.5, patterns: bd.patterns,
    dashT: 0, dashVX: 0, dashVY: 0, dashing: 0,
    summonT: 7, phase: 1, dmg: 22 * dmgMul(), touchT: 0,
    entering: true,
  };
  document.getElementById('bossName').textContent = bd.name;
  document.getElementById('bossBar').classList.remove('hidden');
  Snd.play('boss');
  shake(10);
}

function fireBolt() {
  const st = stats();
  // 가장 가까운 적 탐색
  let tgt = null, best = 1e18;
  for (const e of enemies) {
    if (e.y < -20) continue;
    const d = dist2(player.x, player.y, e.x, e.y);
    if (d < best) { best = d; tgt = e; }
  }
  if (G.boss && !G.boss.entering) {
    const d = dist2(player.x, player.y, G.boss.x, G.boss.y);
    if (d < best) { best = d; tgt = G.boss; }
  }
  if (!tgt) return;
  const ang = Math.atan2(tgt.y - player.y, tgt.x - player.x);
  const n = st.shots;
  const spread = n > 1 ? 0.14 : 0;
  for (let i = 0; i < n; i++) {
    const a = ang + (i - (n - 1) / 2) * spread;
    bullets.push({ x: player.x, y: player.y - 14, vx: Math.cos(a) * 560, vy: Math.sin(a) * 560, dmg: st.dmg, r: 5, life: 1.6 });
  }
  player.wandT = 0.12;
  Snd.play('shoot');
}

function addParticles(x, y, n, color, spd, life, size) {
  for (let i = 0; i < n; i++) {
    if (particles.length >= MAXP) break;
    const a = rand(0, 6.283), s = rand(spd * 0.3, spd);
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, t: 0, life: rand(life * 0.6, life), color, size: rand(size * 0.5, size) });
  }
}

function addText(x, y, txt, color, big) {
  if (texts.length >= MAXT) texts.shift();
  texts.push({ x: x + rand(-8, 8), y, txt, color, t: 0, big: !!big });
}

function dropSouls(x, y, n) {
  for (let i = 0; i < n; i++) {
    pickups.push({ x: x + rand(-14, 14), y: y + rand(-14, 14), vx: rand(-40, 40), vy: rand(-70, -20), t: 0 });
  }
}

function shake(v) { G.shake = Math.min(18, G.shake + v); }

/* ==================== [전투 처리] ==================== */

function damageEnemy(e, dmg, isBoss) {
  e.hp -= dmg;
  e.hitT = 0.08;
  const tick = dmg < 5; // 광선 등 지속 피해는 표시/사운드를 간헐적으로
  if (!tick || Math.random() < 0.15) addText(e.x, e.y - e.r - 6, Math.round(Math.max(1, dmg)), '#baffb0');
  if (e.hp <= 0) {
    if (isBoss) return killBoss();
    Snd.play('die');
    addParticles(e.x, e.y, 14, e.color, 160, 0.7, 4);
    addParticles(e.x, e.y, 8, '#7CFF6B', 120, 0.5, 3);
    dropSouls(e.x, e.y, e.souls);
    const idx = enemies.indexOf(e);
    if (idx >= 0) enemies.splice(idx, 1);
  } else if (!tick || Math.random() < 0.12) {
    Snd.play('hit');
  }
}

function killBoss() {
  const b = G.boss; if (!b) return;
  G.boss = null;
  document.getElementById('bossBar').classList.add('hidden');
  Snd.play('clear');
  shake(16);
  G.flash = 0.5;
  addParticles(b.x, b.y, 60, b.color, 260, 1.2, 6);
  addParticles(b.x, b.y, 40, '#e07bff', 220, 1.0, 5);
  dropSouls(b.x, b.y, 30 + G.stage * 6);
  ebullets.length = 0;
  banner(STAGES[G.stage].horcrux + ' 확보', '영혼의 조각이 어둠 속에서 안전해졌다.');
  schedule(2.4, stageClear);
}

function hurtPlayer(dmg) {
  if (player.dead) return;
  if (player.shieldT > 0) {
    addText(player.x, player.y - 30, '결계', '#8effc0');
    return;
  }
  player.hp -= dmg;
  player.hitFlash = 0.25;
  shake(6);
  Snd.play('hurt');
  addParticles(player.x, player.y, 10, '#ff5d6b', 150, 0.5, 4);
  if (player.hp <= 0) {
    player.hp = 0;
    player.dead = true;
    Input.drag = null;
    Snd.play('over');
    shake(14);
    addParticles(player.x, player.y, 50, '#2b1a4a', 220, 1.2, 6);
    addParticles(player.x, player.y, 30, '#7CFF6B', 260, 1.0, 4);
    schedule(1.4, showGameOver);
  }
}

/* ==================== [스킬] ==================== */

function useSkill(i) {
  if (G.state !== 'play' || player.dead) return;
  if (skillState[i].t > 0) { Snd.play('deny'); return; }
  const st = stats();
  skillState[i].t = SKILLS[i].cd * st.cdr;
  if (i === 0) {
    // 아바다 케다브라: 위쪽 관통 광선
    player.beamT = SKILLS[0].dur;
    Snd.play('beam');
    shake(5);
  } else if (i === 1) {
    // 악령의 불: 확장 화염 고리
    player.ringT = SKILLS[1].dur;
    player.ringHit = new Set();
    Snd.play('fire');
    shake(8);
  } else {
    // 호크룩스 결계: 보호막 + 회복
    player.shieldT = SKILLS[2].dur;
    player.hp = Math.min(player.maxhp, player.hp + player.maxhp * 0.25);
    Snd.play('shieldOn');
    addParticles(player.x, player.y, 20, '#7CFF6B', 130, 0.8, 4);
    addText(player.x, player.y - 34, '+' + Math.round(player.maxhp * 0.25), '#8effc0', true);
  }
}

function updateSkills(dt) {
  const st = stats();
  for (const s of skillState) s.t = Math.max(0, s.t - dt);
  // 광선
  if (player.beamT > 0) {
    player.beamT -= dt;
    const dps = st.dmg * 14;
    const hitW = 46;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.y < player.y && Math.abs(e.x - player.x) < hitW + e.r) damageEnemy(e, dps * dt);
    }
    if (G.boss && !G.boss.entering && G.boss.y < player.y && Math.abs(G.boss.x - player.x) < hitW + G.boss.r) {
      damageEnemy(G.boss, dps * dt, true);
    }
    if (Math.random() < 0.6) addParticles(player.x + rand(-20, 20), rand(0, player.y), 1, '#7CFF6B', 60, 0.4, 3);
  }
  // 화염 고리
  if (player.ringT > 0) {
    player.ringT -= dt;
    const prog = 1 - player.ringT / SKILLS[1].dur;
    const rr = 40 + prog * Math.min(W, 420) * 0.75;
    const hit = (e, isBoss) => {
      const key = isBoss ? 'boss' : e;
      if (player.ringHit.has(key)) return;
      const d = Math.sqrt(dist2(player.x, player.y, e.x, e.y));
      if (Math.abs(d - rr) < 46 + e.r) {
        player.ringHit.add(key);
        damageEnemy(e, st.dmg * (isBoss ? 5 : 7), isBoss);
      }
    };
    for (let i = enemies.length - 1; i >= 0; i--) hit(enemies[i], false);
    if (G.boss && !G.boss.entering) hit(G.boss, true);
    if (particles.length < MAXP - 6) {
      for (let k = 0; k < 5; k++) {
        const a = rand(0, 6.283);
        particles.push({ x: player.x + Math.cos(a) * rr, y: player.y + Math.sin(a) * rr, vx: Math.cos(a) * 60, vy: Math.sin(a) * 60 - 40, t: 0, life: rand(0.3, 0.6), color: Math.random() < 0.5 ? '#ff9b40' : '#ff5d2e', size: rand(2, 5) });
      }
    }
  }
  if (player.shieldT > 0) player.shieldT -= dt;
}

/* ==================== [웨이브] ==================== */

const Spawner = { queue: [], t: 0 };

function waveMix(stage, wave) {
  // 스테이지/웨이브별 적 구성
  const mix = [];
  const count = 7 + stage * 2 + wave * 2;
  for (let i = 0; i < count; i++) {
    let type = 'auror';
    const r = Math.random();
    if (stage === 0) type = r < 0.85 ? 'auror' : 'order';
    else if (stage <= 2) type = r < 0.55 ? 'auror' : (r < 0.9 ? 'order' : 'guardian');
    else type = r < 0.42 ? 'auror' : (r < 0.78 ? 'order' : 'guardian');
    mix.push(type);
  }
  return mix;
}

function startWave(w) {
  G.wave = w;
  const mix = waveMix(G.stage, w);
  const dur = 17 + w * 2.5; // 웨이브당 약 20~30초
  Spawner.queue = mix.map((type, i) => ({ type, at: (i / mix.length) * dur + rand(0, 0.8) }));
  Spawner.t = 0;
  banner('웨이브 ' + w + ' / 5', '');
  updateHUDStage();
}

function updateSpawner(dt) {
  if (!Spawner.queue.length) return;
  Spawner.t += dt;
  while (Spawner.queue.length && Spawner.queue[0].at <= Spawner.t) {
    if (enemies.length >= 14) { Spawner.queue[0].at += 0.8; break; }
    spawnEnemy(Spawner.queue.shift().type);
  }
}

function checkWaveEnd() {
  if (G.pending || player.dead) return;
  if (Spawner.queue.length || enemies.length || G.boss) return;
  if (G.wave < 5) {
    schedule(1.4, () => startWave(G.wave + 1));
  } else if (G.wave === 5) {
    G.wave = 6;
    updateHUDStage();
    const bd = BOSSES[STAGES[G.stage].bossKey];
    banner(bd.name, '"' + bd.line + '"');
    schedule(2.6, spawnBoss);
  }
}

/* ==================== [업데이트: 엔티티] ==================== */

function updatePlayer(dt) {
  if (player.dead) return;
  const st = stats();
  player.maxhp = st.maxhp;
  if (Input.drag) {
    const dx = Input.tx - player.x, dy = Input.ty - player.y;
    const d = Math.hypot(dx, dy);
    if (d > 0.5) {
      const step = Math.min(d, st.speed * dt);
      player.x += (dx / d) * step;
      player.y += (dy / d) * step;
    }
  }
  player.x = clamp(player.x, 22, W - 22);
  player.y = clamp(player.y, H * 0.32, H - 46);
  // 자동 공격
  player.fireT -= dt;
  if (player.fireT <= 0 && (enemies.length || (G.boss && !G.boss.entering))) {
    player.fireT = st.fireInt;
    fireBolt();
  }
  if (player.wandT > 0) player.wandT -= dt;
  if (player.hitFlash > 0) player.hitFlash -= dt;
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t += dt;
    if (e.hitT > 0) e.hitT -= dt;
    if (e.type === 'auror') {
      // 빠르게 하강 + 플레이어 쪽으로 유도
      e.y += e.spd * dt;
      e.x += Math.sin(e.t * 2.4) * 34 * dt + clamp(player.x - e.x, -60, 60) * 0.55 * dt;
    } else if (e.type === 'order') {
      if (e.y < e.stopY) e.y += e.spd * dt * 1.6;
      else {
        e.x += Math.sin(e.t * 1.3) * 42 * dt;
        e.y += Math.sin(e.t * 0.8) * 12 * dt;
        e.fireT -= dt;
        if (e.fireT <= 0 && !player.dead) {
          e.fireT = rand(1.7, 2.6) * Math.max(0.55, 1 - G.stage * 0.05);
          const a = Math.atan2(player.y - e.y, player.x - e.x);
          ebullets.push({ x: e.x, y: e.y + 8, vx: Math.cos(a) * 210, vy: Math.sin(a) * 210, dmg: e.dmg, r: 6, color: '#8ab4ff', life: 5 });
          Snd.play('shoot');
        }
      }
    } else { // guardian
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.spd * dt;
      e.y += Math.sin(a) * e.spd * dt;
    }
    e.x = clamp(e.x, 16, W - 16);
    // 화면 아래로 지나가면 위로 재진입 (교착 방지)
    if (e.y > H + 60) { e.y = -50; e.x = rand(30, W - 30); }
    // 플레이어 접촉
    if (!player.dead && dist2(e.x, e.y, player.x, player.y) < (e.r + player.r) * (e.r + player.r)) {
      if (e.type === 'guardian') {
        e.touchT = (e.touchT || 0) - dt;
        if (e.touchT <= 0) { e.touchT = 0.6; hurtPlayer(e.dmg * 0.6); }
      } else {
        hurtPlayer(e.dmg);
        addParticles(e.x, e.y, 12, e.color, 170, 0.6, 4);
        enemies.splice(i, 1);
        continue;
      }
    }
  }
}

function updateBoss(dt) {
  const b = G.boss; if (!b) return;
  b.t += dt;
  if (b.hitT > 0) b.hitT -= dt;
  if (b.entering) {
    b.y += (b.ty - b.y) * Math.min(1, dt * 2.2);
    if (Math.abs(b.y - b.ty) < 4) b.entering = false;
    return;
  }
  const phase2 = b.hp < b.maxhp * 0.5;
  if (phase2 && b.phase === 1) { b.phase = 2; banner('', '어둠이 짙어진다…'); Snd.play('boss'); shake(8); }
  const spdMul = phase2 ? 1.45 : 1;

  if (b.dashing > 0) {
    b.dashing -= dt;
    b.x += b.dashVX * dt; b.y += b.dashVY * dt;
    if (!player.dead && dist2(b.x, b.y, player.x, player.y) < (b.r + player.r) * (b.r + player.r)) {
      b.touchT -= dt;
      if (b.touchT <= 0) { b.touchT = 0.5; hurtPlayer(b.dmg); }
    }
    if (b.dashing <= 0) { b.returning = true; }
  } else if (b.returning) {
    const tx = W / 2 + Math.sin(b.t * 0.7) * (W * 0.3), ty = H * 0.2;
    b.x += (tx - b.x) * dt * 2; b.y += (ty - b.y) * dt * 2;
    if (Math.abs(b.y - ty) < 10) b.returning = false;
  } else {
    b.x = W / 2 + Math.sin(b.t * 0.7 * spdMul) * (W * 0.32);
    b.y = b.ty + Math.sin(b.t * 1.1) * 16;
  }

  // 접촉 피해 (일반 상태)
  if (!player.dead && dist2(b.x, b.y, player.x, player.y) < (b.r + player.r) * (b.r + player.r)) {
    b.touchT -= dt;
    if (b.touchT <= 0) { b.touchT = 0.55; hurtPlayer(b.dmg * 0.8); }
  }

  // 공격 패턴
  b.fireT -= dt * spdMul;
  if (b.fireT <= 0 && !player.dead && !b.returning) {
    b.patT = (b.patT + 1) % 1000;
    const ps = b.patterns;
    const pick = ps[Math.floor(Math.random() * ps.length)];
    if (pick === 'aim') {
      b.fireT = phase2 ? 1.1 : 1.7;
      const a = Math.atan2(player.y - b.y, player.x - b.x);
      const n = phase2 ? 3 : 2;
      for (let i = 0; i < n; i++) {
        const aa = a + (i - (n - 1) / 2) * 0.22;
        ebullets.push({ x: b.x, y: b.y + 10, vx: Math.cos(aa) * 250, vy: Math.sin(aa) * 250, dmg: b.dmg * 0.65, r: 7, color: '#e07bff', life: 6 });
      }
      Snd.play('shoot');
    } else if (pick === 'spread') {
      b.fireT = phase2 ? 2.0 : 2.8;
      const n = phase2 ? 14 : 10;
      const off = rand(0, 6.28);
      for (let i = 0; i < n; i++) {
        const a = off + (i / n) * 6.283;
        ebullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 170, vy: Math.sin(a) * 170, dmg: b.dmg * 0.5, r: 6, color: '#ff8ad2', life: 6 });
      }
      Snd.play('fire');
    } else if (pick === 'dash') {
      b.fireT = 3.2;
      const a = Math.atan2(player.y - b.y, player.x - b.x);
      b.dashVX = Math.cos(a) * 430; b.dashVY = Math.sin(a) * 430;
      b.dashing = 0.75;
      Snd.play('boss');
      shake(4);
    } else if (pick === 'summon') {
      b.fireT = phase2 ? 3.0 : 4.2;
      if (enemies.length < 10) {
        const n = phase2 ? 3 : 2;
        for (let i = 0; i < n; i++) spawnEnemy(Math.random() < 0.7 ? 'auror' : 'order');
        addParticles(b.x, b.y, 16, b.color, 180, 0.7, 4);
        Snd.play('ui');
      }
    }
  }
  document.getElementById('bossFill').style.width = Math.max(0, (b.hp / b.maxhp) * 100) + '%';
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const p = bullets[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -30 || p.y > H + 30) { bullets.splice(i, 1); continue; }
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (dist2(p.x, p.y, e.x, e.y) < (p.r + e.r) * (p.r + e.r)) {
        damageEnemy(e, p.dmg);
        addParticles(p.x, p.y, 4, '#7CFF6B', 110, 0.35, 3);
        hit = true; break;
      }
    }
    if (!hit && G.boss && !G.boss.entering) {
      const b = G.boss;
      if (dist2(p.x, p.y, b.x, b.y) < (p.r + b.r) * (p.r + b.r)) {
        damageEnemy(b, p.dmg, true);
        addParticles(p.x, p.y, 4, '#7CFF6B', 110, 0.35, 3);
        hit = true;
      }
    }
    if (hit) bullets.splice(i, 1);
  }
}

function updateEBullets(dt) {
  for (let i = ebullets.length - 1; i >= 0; i--) {
    const p = ebullets[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0 || p.x < -30 || p.x > W + 30 || p.y < -40 || p.y > H + 40) { ebullets.splice(i, 1); continue; }
    if (!player.dead && dist2(p.x, p.y, player.x, player.y) < (p.r + player.r - 4) * (p.r + player.r - 4)) {
      hurtPlayer(p.dmg);
      ebullets.splice(i, 1);
    }
  }
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const s = pickups[i];
    s.t += dt;
    if (s.t < 0.35) {
      s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 220 * dt;
    } else {
      const dx = player.x - s.x, dy = player.y - s.y;
      const d = Math.hypot(dx, dy) || 1;
      const sp = 320 + s.t * 500;
      s.x += (dx / d) * sp * dt; s.y += (dy / d) * sp * dt;
      if (d < 26) {
        pickups.splice(i, 1);
        Save.data.souls++;
        G.runSouls++;
        if (Math.random() < 0.4) Snd.play('soul');
        continue;
      }
    }
    if (s.t > 8) pickups.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    if (p.t >= p.life) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 1.6 * dt); p.vy *= (1 - 1.6 * dt);
  }
}

function updateTexts(dt) {
  for (let i = texts.length - 1; i >= 0; i--) {
    const t = texts[i];
    t.t += dt; t.y -= 34 * dt;
    if (t.t > 0.9) texts.splice(i, 1);
  }
}

/* ==================== [렌더링] ==================== */

const ambient = [];
function seedAmbient() {
  ambient.length = 0;
  for (let i = 0; i < 34; i++) {
    ambient.push({ x: Math.random(), y: Math.random(), s: rand(0.4, 1.6), v: rand(6, 26), g: Math.random() < 0.55 });
  }
}

function drawBackground(dt) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0714');
  g.addColorStop(0.45, '#0d0a1c');
  g.addColorStop(0.8, '#0a1410');
  g.addColorStop(1, '#061008');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // 병든 달
  const mx = W * 0.78, my = H * 0.13;
  const mg = ctx.createRadialGradient(mx, my, 4, mx, my, 90);
  mg.addColorStop(0, 'rgba(190,230,170,0.5)');
  mg.addColorStop(0.3, 'rgba(150,200,140,0.16)');
  mg.addColorStop(1, 'rgba(120,180,120,0)');
  ctx.fillStyle = mg;
  ctx.fillRect(mx - 95, my - 95, 190, 190);
  ctx.fillStyle = '#c8dcb2';
  ctx.beginPath(); ctx.arc(mx, my, 26, 0, 6.283); ctx.fill();
  ctx.fillStyle = 'rgba(150,170,130,0.55)';
  ctx.beginPath(); ctx.arc(mx - 7, my - 5, 5, 0, 6.283); ctx.arc(mx + 8, my + 7, 3.4, 0, 6.283); ctx.fill();
  // 원경 실루엣 (탑)
  ctx.fillStyle = '#08060f';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.32);
  ctx.lineTo(W * 0.1, H * 0.24); ctx.lineTo(W * 0.13, H * 0.1); ctx.lineTo(W * 0.16, H * 0.24);
  ctx.lineTo(W * 0.34, H * 0.3); ctx.lineTo(W * 0.5, H * 0.26); ctx.lineTo(W * 0.55, H * 0.14); ctx.lineTo(W * 0.6, H * 0.27);
  ctx.lineTo(W * 0.85, H * 0.31); ctx.lineTo(W, H * 0.28); ctx.lineTo(W, 0); ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.globalAlpha = 0.55; ctx.fill(); ctx.globalAlpha = 1;
  // 떠다니는 불씨/영혼 입자
  for (const a of ambient) {
    a.y -= (a.v * dt) / H;
    a.x += Math.sin((G.time + a.s * 9) * 0.7) * 0.0004;
    if (a.y < -0.02) { a.y = 1.02; a.x = Math.random(); }
    const px = a.x * W, py = a.y * H;
    ctx.globalAlpha = 0.35 + 0.3 * Math.sin(G.time * 2 + a.s * 7);
    ctx.fillStyle = a.g ? '#6fce7a' : '#8a6fd0';
    ctx.beginPath(); ctx.arc(px, py, a.s, 0, 6.283); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // 바닥 안개
  const fg = ctx.createLinearGradient(0, H - 110, 0, H);
  fg.addColorStop(0, 'rgba(20,40,26,0)');
  fg.addColorStop(1, 'rgba(24,46,30,0.5)');
  ctx.fillStyle = fg;
  ctx.fillRect(0, H - 110, W, 110);
}

/* 망토 두른 인영 */
function drawCloaked(x, y, s, cloak, face, eye, hoodUp) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  // 로브
  ctx.fillStyle = cloak;
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.bezierCurveTo(11, -15, 15, -4, 17, 14);
  ctx.lineTo(11, 10); ctx.lineTo(8, 17); ctx.lineTo(3, 11); ctx.lineTo(-2, 18); ctx.lineTo(-7, 11); ctx.lineTo(-12, 16); ctx.lineTo(-17, 14);
  ctx.bezierCurveTo(-15, -4, -11, -15, 0, -18);
  ctx.closePath();
  ctx.fill();
  // 얼굴
  ctx.fillStyle = face;
  ctx.beginPath(); ctx.arc(0, -13, 6.2, 0, 6.283); ctx.fill();
  // 후드
  if (hoodUp) {
    ctx.fillStyle = cloak;
    ctx.beginPath(); ctx.arc(0, -14.5, 7.6, Math.PI * 0.92, Math.PI * 2.08); ctx.lineTo(0, -9); ctx.closePath(); ctx.fill();
  }
  // 눈
  ctx.fillStyle = eye;
  ctx.shadowColor = eye; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(-2.2, -13, 1.15, 0, 6.283); ctx.arc(2.2, -13, 1.15, 0, 6.283); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPlayer() {
  if (player.dead) return;
  const x = player.x, y = player.y;
  // 결계
  if (player.shieldT > 0) {
    const a = Math.min(1, player.shieldT);
    ctx.globalAlpha = 0.28 * a + 0.1 * Math.sin(G.time * 6);
    ctx.fillStyle = '#4fd66a';
    ctx.beginPath(); ctx.arc(x, y - 6, 38, 0, 6.283); ctx.fill();
    ctx.globalAlpha = 0.85 * a;
    ctx.strokeStyle = '#8effb0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y - 6, 38, 0, 6.283); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // 피격 점멸
  if (player.hitFlash > 0 && Math.floor(player.hitFlash * 20) % 2 === 0) ctx.globalAlpha = 0.45;
  drawCloaked(x, y, 1.5, '#181028', '#d9dfd2', '#ff3b46', true);
  ctx.globalAlpha = 1;
  // 지팡이 & 초록 마력
  ctx.strokeStyle = '#5a4632'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x + 10, y - 4); ctx.lineTo(x + 20, y - 20); ctx.stroke();
  const wg = 4 + (player.wandT > 0 ? 5 : 1.5 * Math.sin(G.time * 5) + 1.5);
  const gg = ctx.createRadialGradient(x + 20, y - 21, 0, x + 20, y - 21, wg * 2.4);
  gg.addColorStop(0, 'rgba(150,255,140,0.95)');
  gg.addColorStop(1, 'rgba(60,220,80,0)');
  ctx.fillStyle = gg;
  ctx.beginPath(); ctx.arc(x + 20, y - 21, wg * 2.4, 0, 6.283); ctx.fill();
}

function drawEnemy(e) {
  if (e.type === 'guardian') {
    // 은빛 수호령
    const rr = e.r;
    const gr = ctx.createRadialGradient(e.x, e.y, 2, e.x, e.y, rr * 1.7);
    gr.addColorStop(0, 'rgba(220,245,255,0.9)');
    gr.addColorStop(0.5, 'rgba(140,200,230,0.35)');
    gr.addColorStop(1, 'rgba(120,190,220,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(e.x, e.y, rr * 1.7, 0, 6.283); ctx.fill();
    ctx.strokeStyle = 'rgba(230,250,255,0.85)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, rr * 0.72 + Math.sin(e.t * 3) * 2, 0, 6.283); ctx.stroke();
    // 뿔 (수사슴 느낌의 선)
    ctx.beginPath();
    ctx.moveTo(e.x - 7, e.y - rr * 0.6); ctx.lineTo(e.x - 13, e.y - rr * 1.25); ctx.lineTo(e.x - 18, e.y - rr * 1.1);
    ctx.moveTo(e.x + 7, e.y - rr * 0.6); ctx.lineTo(e.x + 13, e.y - rr * 1.25); ctx.lineTo(e.x + 18, e.y - rr * 1.1);
    ctx.stroke();
  } else {
    drawCloaked(e.x, e.y, e.r / 12, e.color, '#cbb89a', e.eye, e.type === 'order');
  }
  if (e.hitT > 0) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(e.x, e.y - 4, e.r * 0.8, 0, 6.283); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // 체력 바 (다친 적만)
  if (e.hp < e.maxhp) {
    const w = e.r * 2;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w, 3.5);
    ctx.fillStyle = '#e0524f';
    ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w * Math.max(0, e.hp / e.maxhp), 3.5);
  }
}

function drawBoss() {
  const b = G.boss; if (!b) return;
  // 오라
  const ag = ctx.createRadialGradient(b.x, b.y, 6, b.x, b.y, b.r * 2.4);
  ag.addColorStop(0, 'rgba(200,110,255,0.25)');
  ag.addColorStop(1, 'rgba(200,110,255,0)');
  ctx.fillStyle = ag;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 2.4, 0, 6.283); ctx.fill();
  drawCloaked(b.x, b.y + 8, b.r / 11, b.color, '#d8c8ae', b.eye, true);
  if (b.hitT > 0) {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.9, 0, 6.283); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawEffects() {
  // 플레이어 볼트
  ctx.globalCompositeOperation = 'lighter';
  for (const p of bullets) {
    const bg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 10);
    bg.addColorStop(0, 'rgba(180,255,160,0.95)');
    bg.addColorStop(0.4, 'rgba(90,240,100,0.6)');
    bg.addColorStop(1, 'rgba(60,200,80,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 6.283); ctx.fill();
  }
  // 적 탄환
  for (const p of ebullets) {
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.283); ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 1.9, 0, 6.283); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // 아바다 케다브라 광선
  if (player.beamT > 0) {
    const a = Math.min(1, player.beamT / 0.2);
    const bw = 40 + Math.sin(G.time * 40) * 6;
    const lg = ctx.createLinearGradient(player.x - bw, 0, player.x + bw, 0);
    lg.addColorStop(0, 'rgba(60,255,90,0)');
    lg.addColorStop(0.5, 'rgba(160,255,150,' + (0.85 * a) + ')');
    lg.addColorStop(1, 'rgba(60,255,90,0)');
    ctx.fillStyle = lg;
    ctx.fillRect(player.x - bw, 0, bw * 2, player.y - 10);
    ctx.fillStyle = 'rgba(235,255,230,' + (0.9 * a) + ')';
    ctx.fillRect(player.x - 6, 0, 12, player.y - 10);
  }
  // 악령의 불 고리
  if (player.ringT > 0) {
    const prog = 1 - player.ringT / SKILLS[1].dur;
    const rr = 40 + prog * Math.min(W, 420) * 0.75;
    const al = 1 - prog;
    ctx.strokeStyle = 'rgba(255,140,50,' + (0.85 * al) + ')';
    ctx.lineWidth = 16 * al + 4;
    ctx.beginPath(); ctx.arc(player.x, player.y, rr, 0, 6.283); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,230,140,' + (0.7 * al) + ')';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(player.x, player.y, rr * 0.92, 0, 6.283); ctx.stroke();
  }
  // 파티클
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 6.283); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  // 영혼 조각
  for (const s of pickups) {
    ctx.fillStyle = '#baffa0';
    ctx.shadowColor = '#7CFF6B'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y - 5); ctx.lineTo(s.x + 4, s.y); ctx.lineTo(s.x, s.y + 5); ctx.lineTo(s.x - 4, s.y);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // 데미지 숫자
  for (const t of texts) {
    ctx.globalAlpha = Math.max(0, 1 - t.t / 0.9);
    ctx.fillStyle = t.color;
    ctx.font = (t.big ? '800 17px' : '700 13px') + ' -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t.txt, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

/* ==================== [UI / 화면 전환] ==================== */

const $ = id => document.getElementById(id);
const SCREENS = ['scrLoading', 'scrTitle', 'scrStory', 'scrShop', 'scrOver', 'scrVictory', 'scrPause'];

function showScreen(id) {
  for (const s of SCREENS) $(s).classList.toggle('hidden', s !== id);
  const inPlay = (id === null);
  $('hud').classList.toggle('hidden', !inPlay && id !== 'scrPause');
  $('skills').classList.toggle('hidden', !inPlay);
}

let bannerTimer = null;
function banner(main, sub) {
  $('bannerMain').textContent = main;
  $('bannerSub').textContent = sub;
  const el = $('banner');
  el.classList.add('show');
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function updateHUDStage() {
  const s = STAGES[G.stage];
  $('stageText').textContent = s.title + ' · ' + (G.wave <= 5 ? '웨이브 ' + G.wave + '/5' : '보스전');
}

let lastSouls = -1, lastHp = -1;
function updateHUD() {
  if (Save.data.souls !== lastSouls) {
    lastSouls = Save.data.souls;
    $('soulText').textContent = '영혼 조각 ' + lastSouls;
  }
  const hpv = Math.ceil(player.hp);
  if (hpv !== lastHp) {
    lastHp = hpv;
    $('hpFill').style.width = clamp((player.hp / player.maxhp) * 100, 0, 100) + '%';
    $('hpText').textContent = hpv + ' / ' + Math.round(player.maxhp);
  }
  for (let i = 0; i < 3; i++) {
    const el = $('sk' + i);
    const cool = el.querySelector('.cool');
    const cd = SKILLS[i].cd * stats().cdr;
    const pct = skillState[i].t / cd;
    cool.style.height = (pct * 100) + '%';
    el.classList.toggle('ready', pct <= 0 && G.state === 'play');
  }
}

/* ==================== [게임 흐름] ==================== */

function resetStageEntities() {
  enemies.length = 0; bullets.length = 0; ebullets.length = 0;
  particles.length = 0; texts.length = 0; pickups.length = 0;
  Spawner.queue = [];
  G.boss = null; G.pending = null; G.shake = 0; G.flash = 0;
  $('bossBar').classList.add('hidden');
  const st = stats();
  player.maxhp = st.maxhp;
  player.hp = st.maxhp;
  player.dead = false;
  player.beamT = 0; player.ringT = 0; player.shieldT = 0;
  player.x = W / 2; player.y = H * 0.78;
  Input.drag = null;
  for (const s of skillState) s.t = 0;
}

function goTitle() {
  G.state = 'title';
  showScreen('scrTitle');
  const hasSave = Save.data.started;
  $('btnContinue').classList.toggle('hidden', !hasSave);
  $('btnContinue').textContent = Save.data.cleared
    ? '이어하기 (최종장 재도전)'
    : '이어하기 (' + STAGES[Math.min(Save.data.stage, 6)].title.split(' · ')[0] + ')';
}

function startStage(i) {
  G.stage = clamp(i, 0, 6);
  G.state = 'story';
  const s = STAGES[G.stage];
  $('storyTitle').textContent = s.title;
  $('storyPlace').textContent = s.place;
  $('storyText').textContent = s.story;
  showScreen('scrStory');
}

function beginPlay() {
  resetStageEntities();
  G.state = 'play';
  G.wave = 0;
  G.runSouls = 0;
  showScreen(null);
  lastHp = -1; lastSouls = -1;
  startWave(1);
}

function stageClear() {
  Save.data.started = true;
  if (G.stage >= 6) {
    Save.data.cleared = true;
    Save.data.stage = 6;
    Save.write();
    G.state = 'victory';
    $('vicText').textContent = VICTORY_TEXT;
    showScreen('scrVictory');
    return;
  }
  Save.data.stage = Math.max(Save.data.stage, G.stage + 1);
  Save.write();
  openShop(false);
}

function openShop(fromTitle) {
  G.state = 'shop';
  G.shopNext = fromTitle ? Math.min(Save.data.stage, 6) : Math.min(G.stage + 1, 6);
  $('shopStageInfo').textContent = fromTitle
    ? '다음: ' + STAGES[G.shopNext].title
    : STAGES[G.stage].horcrux + ' 확보 완료 — 다음: ' + STAGES[G.shopNext].title;
  renderShop();
  showScreen('scrShop');
}

function upCost(u) {
  const lvl = Save.data.up[u.id];
  return Math.round(u.base * Math.pow(u.mult, lvl));
}

function renderShop() {
  $('shopSouls').textContent = '보유 영혼 조각: ' + Save.data.souls;
  const list = $('shopList');
  list.innerHTML = '';
  for (const u of UPGRADES) {
    const lvl = Save.data.up[u.id];
    const maxed = lvl >= u.max;
    const cost = upCost(u);
    const row = document.createElement('div');
    row.className = 'upRow';
    const info = document.createElement('div');
    info.className = 'upInfo';
    info.innerHTML = '<div class="upName">' + u.name + '<span class="upLvl">Lv.' + lvl + '/' + u.max + '</span></div><div class="upDesc">' + u.desc + '</div>';
    const btn = document.createElement('button');
    btn.className = 'upBuy' + (maxed ? ' maxed' : '');
    btn.textContent = maxed ? '최대' : cost + ' 조각';
    btn.disabled = maxed || Save.data.souls < cost;
    btn.addEventListener('click', () => {
      if (Save.data.souls < cost || lvl >= u.max) { Snd.play('deny'); return; }
      Save.data.souls -= cost;
      Save.data.up[u.id]++;
      Save.write();
      Snd.play('buy');
      renderShop();
    });
    row.appendChild(info); row.appendChild(btn);
    list.appendChild(row);
  }
}

function showGameOver() {
  G.state = 'over';
  Save.write(); // 획득한 영혼은 유지
  $('overText').textContent = OVER_LINES[Math.floor(Math.random() * OVER_LINES.length)];
  $('overSouls').textContent = '이번에 모은 영혼 조각 ' + G.runSouls + '개는 그대로 남는다.';
  showScreen('scrOver');
}

function pauseGame() {
  if (G.state !== 'play') return;
  G.state = 'pause';
  showScreen('scrPause');
}
function resumeGame() {
  if (G.state !== 'pause') return;
  G.state = 'play';
  showScreen(null);
}

/* ==================== [메인 루프] ==================== */

let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = clamp((t - lastT) / 1000, 0, 0.05);
  lastT = t;
  G.time += dt;

  if (G.state === 'play') {
    if (G.pending) {
      G.pending.t -= dt;
      if (G.pending.t <= 0) { const fn = G.pending.fn; G.pending = null; fn(); }
    }
    updatePlayer(dt);
    updateSkills(dt);
    updateSpawner(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateBullets(dt);
    updateEBullets(dt);
    updatePickups(dt);
    updateParticles(dt);
    updateTexts(dt);
    checkWaveEnd();
  } else if (G.state === 'over' || G.state === 'victory') {
    updateParticles(dt);
    updateTexts(dt);
  }

  // ---- 그리기 ----
  ctx.save();
  if (G.shake > 0.2) {
    G.shake *= Math.pow(0.02, dt);
    ctx.translate(rand(-G.shake, G.shake), rand(-G.shake, G.shake));
  } else G.shake = 0;

  drawBackground(dt);

  const showWorld = (G.state === 'play' || G.state === 'pause' || G.state === 'over');
  if (showWorld) {
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawPlayer();
    drawEffects();
  }
  ctx.restore();

  if (G.flash > 0) {
    ctx.fillStyle = 'rgba(220,255,210,' + (G.flash * 0.6) + ')';
    ctx.fillRect(0, 0, W, H);
    G.flash -= dt * 1.6;
  }

  if (G.state === 'play' || G.state === 'pause') updateHUD();
}

/* ==================== [초기화] ==================== */

function bindUI() {
  const tap = (id, fn) => {
    $(id).addEventListener('click', e => { e.preventDefault(); Snd.unlock(); Snd.play('ui'); fn(); });
  };
  tap('btnNew', () => {
    const keep = Save.data.muted;
    Save.reset();
    Save.data.muted = keep;
    Save.data.started = true;
    Save.write();
    lastSouls = -1;
    startStage(0);
  });
  tap('btnContinue', () => {
    Save.data.started = true;
    openShop(true);
  });
  tap('btnStoryGo', beginPlay);
  $('scrStory').addEventListener('click', e => {
    if (e.target.id !== 'btnStoryGo' && G.state === 'story') { Snd.unlock(); Snd.play('ui'); beginPlay(); }
  });
  tap('btnShopGo', () => startStage(G.shopNext != null ? G.shopNext : 0));
  tap('btnRetry', () => startStage(G.stage));
  tap('btnOverTitle', goTitle);
  tap('btnVicTitle', goTitle);
  tap('btnResume', resumeGame);
  tap('btnPauseTitle', () => { Save.write(); goTitle(); });
  tap('pauseBtn', () => { if (G.state === 'play') pauseGame(); else if (G.state === 'pause') resumeGame(); });

  const muteBtn = $('muteBtn');
  const refreshMute = () => muteBtn.classList.toggle('off', Snd.muted);
  muteBtn.addEventListener('click', e => {
    e.preventDefault();
    Snd.unlock();
    Snd.setMuted(!Snd.muted);
    refreshMute();
  });
  refreshMute();

  // 스킬 버튼 (터치 반응 우선)
  for (let i = 0; i < 3; i++) {
    const el = $('sk' + i);
    const h = e => { e.preventDefault(); e.stopPropagation(); Snd.unlock(); useSkill(i); };
    if (window.PointerEvent) el.addEventListener('pointerdown', h, { passive: false });
    else { el.addEventListener('touchstart', h, { passive: false }); el.addEventListener('mousedown', h); }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && G.state === 'play') pauseGame();
  });
}

function init() {
  resize();
  seedAmbient();
  player.x = W / 2;
  player.y = H * 0.78;
  Input.init();
  bindUI();
  requestAnimationFrame(loop);
  setTimeout(() => { if (G.state === 'loading') goTitle(); }, 900);
}

init();
</script>
</body>
