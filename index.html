<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="볼드모트">
<meta name="theme-color" content="#07070c">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0714'/%3E%3Ccircle cx='11' cy='16' r='3.4' fill='%237CFF6B'/%3E%3Ccircle cx='21' cy='16' r='3.4' fill='%237CFF6B'/%3E%3C/svg%3E">
<title>볼드모트: 어둠의 군주</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html, body {
    position:fixed; inset:0; width:100%; height:100%;
    overflow:hidden; overscroll-behavior:none;
    background:#07070c; color:#d8d4e6;
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  #game { position:fixed; inset:0; display:block; touch-action:none; }

  /* ---------- 공통 오버레이 ---------- */
  .screen {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    padding-top:calc(env(safe-area-inset-top) + 24px);
    padding-bottom:calc(env(safe-area-inset-bottom) + 24px);
    background:rgba(5,4,12,0.82);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    opacity:1; transition:opacity .45s ease;
    text-align:center;
  }
  .screen.hidden { opacity:0; pointer-events:none; }
  .btn.hidden { display:none; }

  /* 타이틀/스토리는 캔버스 아트가 비치도록 얇은 스크림만 */
  #scrTitle { background:rgba(5,4,12,0.28); -webkit-backdrop-filter:none; backdrop-filter:none; justify-content:flex-end; padding-bottom:calc(env(safe-area-inset-bottom) + 54px); }
  #scrStory { background:rgba(4,3,10,0.30); -webkit-backdrop-filter:none; backdrop-filter:none; justify-content:flex-end; padding-bottom:calc(env(safe-area-inset-bottom) + 34px); }

  h1.gameTitle {
    font-size:clamp(34px, 10vw, 52px); font-weight:800; letter-spacing:.06em;
    color:#7CFF6B;
    text-shadow:0 0 18px rgba(80,255,90,.55), 0 0 60px rgba(60,220,80,.25), 0 2px 8px #000;
    margin-bottom:6px;
  }
  .subTitle { font-size:15px; color:#bdb2e0; letter-spacing:.35em; margin-bottom:34px; text-shadow:0 1px 6px #000; }
  .btn {
    display:block; width:min(78vw, 300px); margin:9px auto; padding:15px 10px;
    font-size:17px; font-weight:700; color:#d9ffd2; letter-spacing:.08em;
    background:linear-gradient(180deg, rgba(20,48,24,.92), rgba(8,20,12,.95));
    border:1px solid rgba(110,255,120,.35); border-radius:12px;
    box-shadow:0 0 14px rgba(60,220,80,.18), inset 0 1px 0 rgba(255,255,255,.06);
    cursor:pointer; font-family:inherit;
    transition:transform .08s ease, box-shadow .2s;
  }
  .btn:active { transform:scale(.965); box-shadow:0 0 22px rgba(80,255,100,.35); }
  .btn.secondary { color:#b9b0d8; border-color:rgba(150,130,220,.3); background:linear-gradient(180deg, rgba(30,24,52,.9), rgba(14,10,26,.95)); box-shadow:0 0 12px rgba(120,90,220,.14); }
  .btn:disabled { opacity:.35; pointer-events:none; }
  .noteIP { position:absolute; bottom:calc(env(safe-area-inset-bottom) + 10px); left:0; right:0; font-size:10.5px; color:#8d86a8; line-height:1.5; padding:0 16px; text-shadow:0 1px 3px #000; }

  /* ---------- 로딩 ---------- */
  #scrLoading .loadOrb {
    width:64px; height:64px; border-radius:50%; margin-bottom:22px;
    background:radial-gradient(circle at 40% 35%, #a8ff9a, #1f8a2e 55%, #06230b 80%);
    box-shadow:0 0 34px rgba(90,255,100,.7);
    animation:pulse 1.1s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform:scale(.85); opacity:.7; } to { transform:scale(1.08); opacity:1; } }
  #scrLoading p { color:#8fbf8a; letter-spacing:.2em; font-size:14px; }

  /* ---------- 스토리 ---------- */
  #storyPanel {
    width:min(92vw, 520px); text-align:left;
    background:linear-gradient(180deg, rgba(6,4,14,.55), rgba(6,4,14,.88) 30%, rgba(6,4,14,.92));
    border:1px solid rgba(140,110,220,.22); border-radius:16px;
    padding:20px 18px 16px;
    box-shadow:0 8px 40px rgba(0,0,0,.55);
  }
  #storyTitle { font-size:21px; font-weight:800; color:#c9b3ff; margin-bottom:5px; text-shadow:0 0 16px rgba(150,90,255,.4); }
  #storyPlace { font-size:12.5px; color:#9a8fc0; letter-spacing:.22em; margin-bottom:16px; }
  #storyText { min-height:132px; font-size:15px; line-height:1.8; color:#d8d2ea; white-space:pre-line; margin-bottom:6px; }
  #storyText .cursor { display:inline-block; width:9px; height:16px; background:#9d7bff; vertical-align:-2px; animation:blink .7s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  #storyHint { font-size:11.5px; color:#847ba5; margin-top:12px; text-shadow:0 1px 3px #000; }
  #btnStoryGo { margin-top:14px; }

  /* ---------- 상점 ---------- */
  #scrShop { justify-content:flex-start; padding-top:calc(env(safe-area-inset-top) + 34px); overflow-y:auto; }
  #scrShop h2 { font-size:22px; color:#7CFF6B; margin-bottom:4px; text-shadow:0 0 14px rgba(90,255,100,.4); }
  #shopStageInfo { font-size:13px; color:#8b82ad; margin-bottom:10px; }
  #shopSouls { font-size:16px; font-weight:700; color:#b9ff8e; margin-bottom:18px; }
  #shopList { width:min(92vw, 420px); }
  .upRow {
    display:flex; align-items:center; gap:10px;
    background:rgba(20,16,38,.85); border:1px solid rgba(130,110,200,.22);
    border-radius:12px; padding:11px 12px; margin-bottom:9px; text-align:left;
  }
  .upInfo { flex:1; min-width:0; }
  .upName { font-size:15px; font-weight:700; color:#e4ddf5; }
  .upLvl { font-size:12px; color:#8fe08a; margin-left:6px; }
  .upDesc { font-size:12px; color:#8b82ad; margin-top:3px; }
  .upBuy {
    flex:none; padding:9px 13px; min-width:76px;
    font-size:13.5px; font-weight:700; color:#d9ffd2; font-family:inherit;
    background:linear-gradient(180deg, rgba(22,52,26,.95), rgba(9,22,13,.95));
    border:1px solid rgba(110,255,120,.35); border-radius:10px; cursor:pointer;
  }
  .upBuy:active { transform:scale(.95); }
  .upBuy:disabled { opacity:.32; }
  .upBuy.maxed { color:#9a8fc0; border-color:rgba(150,130,220,.3); background:rgba(28,22,48,.8); }

  /* ---------- 게임오버 / 승리 ---------- */
  #overTitle { font-size:30px; font-weight:800; color:#ff5d5d; text-shadow:0 0 20px rgba(255,60,60,.5); margin-bottom:12px; }
  #overText, #vicText { max-width:480px; font-size:15px; line-height:1.8; color:#c5bedb; margin-bottom:26px; white-space:pre-line; }
  #vicTitle { font-size:28px; font-weight:800; color:#b7ff86; text-shadow:0 0 22px rgba(120,255,100,.55); margin-bottom:12px; }

  /* ---------- 일시정지 ---------- */
  #pauseTitle { font-size:24px; font-weight:800; color:#cfc8e2; margin-bottom:24px; letter-spacing:.15em; }

  /* ---------- HUD ---------- */
  #hud {
    position:fixed; left:0; right:0; top:0; z-index:10;
    padding:calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 10px) 0 calc(env(safe-area-inset-left) + 10px);
    display:flex; align-items:flex-start; gap:8px;
    pointer-events:none;
    opacity:1; transition:opacity .3s;
  }
  #hud.hidden { opacity:0; }
  #hudLeft { flex:1; min-width:0; }
  #hpBar {
    width:min(46vw, 210px); height:15px; border-radius:8px;
    background:rgba(10,8,20,.75); border:1px solid rgba(255,90,90,.35);
    overflow:hidden; position:relative;
  }
  #hpFill { height:100%; width:100%; border-radius:7px;
    background:linear-gradient(90deg, #5f1420, #c22b3f 60%, #ff5d6b);
    box-shadow:0 0 10px rgba(255,70,90,.45);
    transition:width .15s linear; }
  #hpText { position:absolute; inset:0; font-size:10px; font-weight:700; color:#ffd9dd; display:flex; align-items:center; justify-content:center; text-shadow:0 1px 2px #000; }
  #stageText { font-size:12px; font-weight:700; color:#a99ecf; margin-top:5px; text-shadow:0 1px 3px #000; }
  #soulText { font-size:13px; font-weight:800; color:#b9ff8e; margin-top:3px; text-shadow:0 0 8px rgba(120,255,100,.5); }
  .hudBtn {
    pointer-events:auto; flex:none;
    width:38px; height:38px; border-radius:10px;
    background:rgba(14,11,28,.8); border:1px solid rgba(140,120,210,.3);
    color:#cfc8e2; font-size:15px; font-weight:800; font-family:inherit;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .hudBtn:active { transform:scale(.92); }
  .hudBtn.off { color:#5c5575; text-decoration:line-through; }

  /* ---------- 보스 바 ---------- */
  #bossBar {
    position:fixed; z-index:10; left:50%; transform:translateX(-50%);
    top:calc(env(safe-area-inset-top) + 62px);
    width:min(78vw, 340px); text-align:center;
    transition:opacity .4s;
  }
  #bossBar.hidden { opacity:0; }
  #bossName { font-size:13px; font-weight:800; color:#e8b3ff; text-shadow:0 0 10px rgba(200,90,255,.6); margin-bottom:4px; }
  #bossTrack { height:10px; border-radius:6px; background:rgba(10,8,20,.75); border:1px solid rgba(200,90,255,.4); overflow:hidden; }
  #bossFill { height:100%; width:100%; background:linear-gradient(90deg,#4b1160,#a12bd6 60%,#e07bff); box-shadow:0 0 10px rgba(200,90,255,.5); transition:width .12s linear; }

  /* ---------- 스킬 버튼 (왼쪽 하단 · 아이콘 · 2x3) ---------- */
  #skills {
    position:fixed; z-index:10;
    left:calc(env(safe-area-inset-left) + 12px);
    bottom:calc(env(safe-area-inset-bottom) + 14px);
    display:grid;
    grid-template-areas: "k4 k5" "k2 k3" "k0 k1";
    gap:10px;
    transition:opacity .3s;
  }
  #skills.hidden { opacity:0; pointer-events:none; }
  #sk0 { grid-area:k0; } #sk1 { grid-area:k1; } #sk2 { grid-area:k2; }
  #sk3 { grid-area:k3; } #sk4 { grid-area:k4; } #sk5 { grid-area:k5; }
  .skill {
    position:relative; width:56px; height:56px; border-radius:50%;
    border:2px solid rgba(110,255,120,.5);
    background:radial-gradient(circle at 35% 30%, rgba(40,90,45,.95), rgba(8,18,10,.95));
    color:#baf5b0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 14px rgba(70,230,90,.25);
    cursor:pointer; overflow:hidden; touch-action:none; padding:0; font-family:inherit;
  }
  .skill:active { transform:scale(.93); }
  .skill svg { position:relative; z-index:1; width:30px; height:30px; display:block; filter:drop-shadow(0 1px 2px rgba(0,0,0,.8)); pointer-events:none; }
  .skill .cool {
    position:absolute; left:0; right:0; bottom:0; height:0%;
    background:rgba(4,6,12,.82); pointer-events:none; z-index:2;
  }
  .skill.s1 { border-color:rgba(255,150,60,.55); background:radial-gradient(circle at 35% 30%, rgba(110,50,15,.95), rgba(22,8,4,.95)); color:#ffc07a; box-shadow:0 0 14px rgba(255,130,40,.25); }
  .skill.s2 { border-color:rgba(170,110,255,.55); background:radial-gradient(circle at 35% 30%, rgba(60,32,110,.95), rgba(12,6,24,.95)); color:#cfaaff; box-shadow:0 0 14px rgba(160,90,255,.25); }
  .skill.s3 { border-color:rgba(120,230,160,.55); background:radial-gradient(circle at 35% 30%, rgba(20,80,50,.95), rgba(5,18,12,.95)); color:#8fe8b0; box-shadow:0 0 14px rgba(80,220,140,.22); }
  .skill.s4 { border-color:rgba(255,90,110,.55); background:radial-gradient(circle at 35% 30%, rgba(110,20,35,.95), rgba(24,5,9,.95)); color:#ff8fa0; box-shadow:0 0 14px rgba(255,70,100,.22); }
  .skill.s5 { border-color:rgba(190,255,120,.6); background:radial-gradient(circle at 35% 30%, rgba(50,90,20,.95), rgba(10,18,4,.95)); color:#d2ff9a; box-shadow:0 0 14px rgba(160,255,80,.25); }
  .skill.ready { animation:readyGlow 1.6s ease-in-out infinite alternate; }
  @keyframes readyGlow { from { box-shadow:0 0 8px rgba(160,255,160,.25); } to { box-shadow:0 0 22px rgba(160,255,160,.6); } }
  .skill.locked { border-color:rgba(120,110,150,.35); background:radial-gradient(circle at 35% 30%, rgba(34,30,48,.95), rgba(10,8,18,.95)); color:#6b6386; box-shadow:none; }
  .skill.locked svg { opacity:.55; }

  /* ---------- 배너 ---------- */
  #banner {
    position:fixed; z-index:15; left:0; right:0; top:34%;
    text-align:center; pointer-events:none;
    opacity:0; transition:opacity .35s;
    padding:0 18px;
  }
  #banner.show { opacity:1; }
  #bannerMain { font-size:24px; font-weight:800; color:#e6ddff; text-shadow:0 0 16px rgba(150,90,255,.65), 0 2px 6px #000; letter-spacing:.06em; }
  #bannerSub { font-size:14px; color:#b9aee0; margin-top:8px; text-shadow:0 1px 4px #000; line-height:1.6; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hudLeft">
    <div id="hpBar"><div id="hpFill"></div><div id="hpText"></div></div>
    <div id="stageText"></div>
    <div id="soulText"></div>
  </div>
  <button class="hudBtn" id="muteBtn" aria-label="소리">♪</button>
  <button class="hudBtn" id="pauseBtn" aria-label="일시정지">❚❚</button>
</div>

<div id="bossBar" class="hidden">
  <div id="bossName"></div>
  <div id="bossTrack"><div id="bossFill"></div></div>
</div>

<div id="skills" class="hidden">
  <button class="skill s0" id="sk0" aria-label="아바다 케다브라"><div class="cool"></div></button>
  <button class="skill s1" id="sk1" aria-label="악령의 불"><div class="cool"></div></button>
  <button class="skill s2" id="sk2" aria-label="호크룩스 결계"><div class="cool"></div></button>
  <button class="skill s3" id="sk3" aria-label="나기니의 습격"><div class="cool"></div></button>
  <button class="skill s4" id="sk4" aria-label="크루시아투스"><div class="cool"></div></button>
  <button class="skill s5" id="sk5" aria-label="어둠의 표식"><div class="cool"></div></button>
</div>

<div id="banner"><div id="bannerMain"></div><div id="bannerSub"></div></div>

<!-- 로딩 -->
<div class="screen" id="scrLoading">
  <div class="loadOrb"></div>
  <p>어둠을 깨우는 중…</p>
</div>

<!-- 타이틀 -->
<div class="screen hidden" id="scrTitle">
  <h1 class="gameTitle">볼드모트</h1>
  <div class="subTitle">어둠의 군주</div>
  <button class="btn" id="btnNew">새로 시작</button>
  <button class="btn secondary hidden" id="btnContinue">이어하기</button>
  <div class="noteIP">비공식 팬 게임 · Harry Potter는 원작자와 워너브라더스의 자산입니다<br>드래그로 이동 · 스킬 버튼으로 어둠의 마법 시전</div>
</div>

<!-- 스토리 -->
<div class="screen hidden" id="scrStory">
  <div id="storyPanel">
    <div id="storyTitle"></div>
    <div id="storyPlace"></div>
    <div id="storyText"></div>
    <button class="btn" id="btnStoryGo">전투 개시</button>
    <div id="storyHint">화면을 누르면 이야기를 넘깁니다</div>
  </div>
</div>

<!-- 상점 -->
<div class="screen hidden" id="scrShop">
  <h2>어둠의 제단</h2>
  <div id="shopStageInfo"></div>
  <div id="shopSouls"></div>
  <div id="shopList"></div>
  <button class="btn" id="btnShopGo" style="margin-top:14px;">다음 스테이지로</button>
</div>

<!-- 게임 오버 -->
<div class="screen hidden" id="scrOver">
  <div id="overTitle">쓰러졌다…</div>
  <div id="overText"></div>
  <div id="overSouls" style="font-size:14px;color:#b9ff8e;margin-bottom:20px;"></div>
  <button class="btn" id="btnRetry">이 스테이지 재도전</button>
  <button class="btn secondary" id="btnOverTitle">처음 화면으로</button>
</div>

<!-- 승리 -->
<div class="screen hidden" id="scrVictory">
  <div id="vicTitle">어둠이 세상을 덮다</div>
  <div id="vicText"></div>
  <button class="btn secondary" id="btnVicTitle">처음 화면으로</button>
</div>

<!-- 일시정지 -->
<div class="screen hidden" id="scrPause">
  <div id="pauseTitle">일시정지</div>
  <button class="btn" id="btnResume">계속하기</button>
  <button class="btn secondary" id="btnPauseTitle">처음 화면으로</button>
</div>

<script src="src/art.js"></script>
<script src="src/game.js"></script>
</body>
</html>
